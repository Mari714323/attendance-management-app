<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勤怠管理システム - ダッシュボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">勤怠管理システム</span>
            <div class="d-flex">
                <span class="navbar-text me-3">{{ username }} さん（{{ '管理者' if role == 'admin' else '従業員' }}）</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">ログアウト</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if role == 'admin' %}
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card border-primary shadow-sm">
                    <div class="card-header bg-primary text-white">管理者メニュー</div>
                    <div class="card-body">
                        <div class="btn-group">
                            <a href="#" class="btn btn-outline-primary">従業員一覧・給与計算</a>
                            <a href="#" class="btn btn-outline-primary">勤務データエクスポート</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h4 class="mb-4">本日の打刻</h4>
                        <div class="d-grid gap-3">
                            <button class="btn btn-success btn-lg py-3">出勤</button>
                            <button class="btn btn-danger btn-lg py-3">退勤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
