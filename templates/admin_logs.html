<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>操作ログ一覧 - 勤怠管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">管理操作ログ</span>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light btn-sm">管理者パネルへ戻る</a>
        </div>
    </nav>
    <div class="container">
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-sm table-hover">
                    <thead class="table-secondary">
                        <tr>
                            <th>日時</th>
                            <th>管理者</th>
                            <th>操作</th>
                            <th>対象従業員</th>
                            <th>詳細内容</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td>{{ log.timestamp.strftime('%Y/%m/%d %H:%M') }}</td>
                            <td>{{ log.admin.username }}</td>
                            <td><span class="badge {{ 'bg-danger' if log.action == '削除' else 'bg-primary' }}">{{ log.action }}</span></td>
                            <td>{{ log.target_user_name }}</td>
                            <td>{{ log.description }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
