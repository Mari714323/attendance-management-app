{% extends "base.html" %}

{% block title %}パスワード変更 - 勤怠管理システム{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4 fw-bold">パスワード変更</h4>
                <form action="{{ url_for('auth.change_password') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">現在のパスワード</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">新しいパスワード</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">新しいパスワード（確認）</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">パスワードを更新</button>
                        <a href="{{ url_for('staff.index') }}" class="btn btn-outline-secondary">キャンセル</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
