{% extends "base.html" %}

{% block title %}ログイン - 勤怠管理システム{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">ログイン</h3>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">ユーザー名</label>
                        <input type="text" name="username" class="form-control" placeholder="ユーザー名を入力" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">パスワード</label>
                        <input type="password" name="password" class="form-control" placeholder="パスワードを入力" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">ログイン</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
